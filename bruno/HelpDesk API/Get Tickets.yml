info:
  name: Get Tickets
  type: http
  seq: 1

http:
  method: GET
  url: "{{BASE_URL}}/tickets"
  params:
    - name: status
      value: open
      type: query
      disabled: true
    - name: priority
      value: "5"
      type: query
      disabled: true
    - name: limit
      value: "5"
      type: query
      disabled: true
    - name: page
      value: "1"
      type: query
      disabled: true
  auth: inherit

runtime:
  variables:
    - name: BASE_URL
      value: http://localhost:3000

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
