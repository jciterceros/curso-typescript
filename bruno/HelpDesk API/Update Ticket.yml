info:
  name: Update Ticket
  type: http
  seq: 5

http:
  method: PATCH
  url: "{{BASE_URL}}/tickets/:id"
  headers:
    - name: Content-Type
      value: application/json
  params:
    - name: id
      value: t1
      type: path
  body:
    type: json
    data: |-
      {
        "status": "in_progress"
      }
  auth: inherit

runtime:
  variables:
    - name: BASE_URL
      value: http://localhost:3000

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
